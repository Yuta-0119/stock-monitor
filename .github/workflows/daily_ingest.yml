name: Daily Stock Data Ingestion
on:
  schedule:
    - cron: '30 7 * * 1-5'  # 16:30 JST (UTC+9)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - analytics
          - snapshot
          - export
          - init
          - check
          - setup

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BQ_PROJECT: onitsuka-app
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Step 1 - Data ingestion (daily + minute)
        run: python -m src.main --mode ${{ github.event.inputs.mode || 'daily' }}

      - name: Step 2 - Analytics Layer
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode analytics

      - name: Step 2b - Cache refresh (all tables)
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python scripts/refresh_cache.py

      - name: Step 3a - Holdings sync
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        continue-on-error: true
        run: python scripts/load_holdings.py

      - name: Step 3b - External prices
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python scripts/fetch_external_prices.py

      - name: Step 4 - Google Sheets export
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode export

      - name: Notify success
        if: success() && (github.event_name == 'schedule' || github.event.inputs.mode == 'daily')
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"attachments":[{"color":"good","text":"ETL Daily Update completed successfully (GitHub Actions)"}]}'

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"attachments":[{"color":"danger","text":"ETL Daily Update FAILED (GitHub Actions). Check: https://github.com/Yuta-0119/stock-monitor/actions"}]}'
          echo "Pipeline failed at $(date '+%Y-%m-%d %H:%M:%S JST')"
