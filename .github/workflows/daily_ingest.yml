name: Daily Stock Data Ingestion
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - analytics
          - snapshot
          - export
          - init
          - check
          - setup

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BQ_PROJECT: onitsuka-app
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Step 1 – データ取込み
        run: python -m src.main --mode ${{ github.event.inputs.mode || 'daily' }}

      - name: Step 2 – Analytics Layer 更新
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode analytics

      - name: Step 3 – 保有銘柄 BigQuery 同期
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python scripts/load_holdings.py

      - name: Step 4 – Google Sheets エクスポート
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode export

      - name: Report failure
        if: failure()
        run: echo "Pipeline failed at $(date '+%Y-%m-%d %H:%M:%S JST')"
