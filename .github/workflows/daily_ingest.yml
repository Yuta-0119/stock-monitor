name: Daily Stock Data Ingestion
on:
  schedule:
    - cron: '0 9 * * 1-5'  # 平日 JST 18:00（UTC 09:00）
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - init
          - check
          - setup
          - analytics
          - export
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 1: データ取込み（daily / init / check / setup）
      - name: Run ingestion
        run: python -m src.main --mode ${{ github.event.inputs.mode || 'daily' }}
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}

      # Step 2: Analytics Layer 更新（dailyスケジュール実行時のみ）
      - name: Build Analytics Layer
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode analytics
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}

      # Step 3: Google Sheets エクスポート（dailyスケジュール実行時のみ）
      - name: Export to Google Sheets
        if: ${{ github.event.inputs.mode == 'daily' || github.event_name == 'schedule' }}
        run: python -m src.main --mode export
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

      - name: Report status
        if: failure()
        run: echo "Pipeline failed"
