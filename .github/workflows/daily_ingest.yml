name: Daily Stock Data Ingestion

on:
  schedule:
    # UTC 09:00 = JST 18:00（平日のみ）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - init
          - check
          - setup

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run ingestion
        run: python -m src.main --mode ${{ github.event.inputs.mode || 'daily' }}
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}

      - name: Report status
        if: failure()
        run: |
          echo "::error::Daily ingestion failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
