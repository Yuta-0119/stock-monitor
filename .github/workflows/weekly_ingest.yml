name: Weekly Market Data Ingestion

on:
  schedule:
    # UTC 01:00 = JST 10:00（毎週土曜）
    - cron: '0 1 * * 6'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run weekly ingestion
        run: python -m src.main --mode weekly
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          BQ_PROJECT: onitsuka-app
